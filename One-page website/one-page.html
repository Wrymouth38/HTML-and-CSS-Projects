<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One page website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #111;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      margin: 20px 0;
      font-size: 18px;
    }

    input[type="email"] {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      background-color: #ff6600;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff4500;
    }

    hr {
      margin: 40px 0;
      border: 1px solid #444;
    }
  </style>
</head>

<body>

  <h1>We value your opinion and would like to hear what you think about current state of gaming industry</h1>

  <hr>

  <p>Please provide us with your email address to receive Opinion form</p>

  <form>
    <input type="email" placeholder="Enter your email" required><br>
    <button type="submit">Submit</button>
  </form>

</body>
</html>
